<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Connect | Professional WiFi Card Generator</title>
  
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --accent: #8b5cf6;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
      --radius: 16px;
      --shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
    }

    /* Base Reset */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.6);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .brand {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .github-link {
      color: var(--text-main);
      font-size: 1.4rem;
      transition: transform 0.3s ease;
      padding: 5px;
    }
    .github-link:hover { transform: rotate(15deg) scale(1.1); color: var(--primary); }

    /* Layout */
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: start;
      flex: 1;
    }

    /* Controls Panel */
    .controls-panel {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      padding: 2rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      animation: slideInLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    h2 { font-size: 1.2rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 10px; }
    h2 i { color: var(--primary); }

    .form-group { margin-bottom: 1.25rem; }
    
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    input[type="text"], select {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      padding: 0.9rem 1rem;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
      background: rgba(0, 0, 0, 0.3);
    }

    /* Checkbox Style */
    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      margin-top: 10px;
      padding: 5px 0;
    }
    .checkbox-wrapper input {
      accent-color: var(--primary);
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* Password Strength */
    .strength-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      margin-top: 8px;
      border-radius: 2px;
      overflow: hidden;
      display: flex;
    }
    .strength-fill {
      height: 100%;
      width: 0;
      transition: width 0.3s ease, background-color 0.3s ease;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.1s, box-shadow 0.2s;
      touch-action: manipulation;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }
    .btn-primary:active { transform: scale(0.98); }

    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    
    .btn-outline {
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
    .btn-outline:active { transform: scale(0.98); }

    /* Preview Section */
    .preview-panel {
      position: sticky;
      top: 6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* --- WIFI CARD REDESIGN --- */
    #wifi-card {
      width: 100%;
      max-width: 380px;
      /* Dynamic Aspect Ratio for better mobile fit */
      min-height: 520px;
      background: #ffffff;
      border-radius: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 50px -10px rgba(0,0,0,0.5);
      color: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0;
      transition: transform 0.3s ease;
    }

    .card-header-bg {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-bottom-left-radius: 50% 30px;
      border-bottom-right-radius: 50% 30px;
      position: absolute;
      top: 0; left: 0;
      z-index: 1;
    }

    .card-content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem;
    }

    .network-icon-display {
      width: 72px;
      height: 72px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      margin-top: 25px;
      margin-bottom: 1.25rem;
      color: #0f172a;
    }

    .ssid-display { 
      font-size: 1.5rem; 
      font-weight: 800; 
      margin-bottom: 0.5rem; 
      line-height: 1.2;
      color: #0f172a;
      max-width: 100%;
      word-wrap: break-word;
      padding: 0 10px;
    }
    
    .pass-display { 
      font-size: 0.9rem; 
      color: #64748b; 
      font-family: 'Courier New', monospace; 
      background: #f1f5f9; 
      padding: 6px 14px; 
      border-radius: 12px; 
      display: inline-block;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: auto; /* Pushes QR code to bottom */
    }

    .qr-frame {
      margin-top: 1.5rem;
      background: white;
      padding: 10px;
      border-radius: 16px;
      border: 2px dashed #cbd5e1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .scan-me-text {
      margin-top: 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #94a3b8;
      font-weight: 700;
    }

    /* --- RESPONSIVE BREAKPOINTS --- */
    
    /* Tablet (Max Width 1024px) */
    @media (max-width: 1024px) {
      .container {
        gap: 2rem;
      }
      #wifi-card {
        max-width: 340px;
      }
    }

    /* Mobile (Max Width 900px) - Switches to Single Column */
    @media (max-width: 900px) {
      .navbar {
        padding: 1rem 1.5rem;
      }
      
      .container {
        grid-template-columns: 1fr; /* Stack vertically */
        padding: 1.5rem;
        gap: 3rem;
      }

      /* Control panel usually comes first in DOM, so it stays on top */
      .controls-panel {
        order: 1; /* Explicitly keep controls first for better typing flow */
      }
      
      .preview-panel {
        order: 2; /* Preview below controls on mobile */
        position: static; /* Remove sticky on mobile */
        transform: none;
      }

      #wifi-card {
        max-width: 100%; /* Use full width available */
        width: 320px; /* Optimal width for phone screens */
        min-height: auto;
        aspect-ratio: 1/1.5;
      }
    }

    /* Small Mobile (Max Width 480px) */
    @media (max-width: 480px) {
      .container {
        padding: 1rem;
        gap: 2rem;
      }
      
      .controls-panel {
        padding: 1.5rem 1.25rem;
      }

      .btn-group {
        grid-template-columns: 1fr; /* Stack buttons vertically */
      }

      #wifi-card {
        width: 100%; 
        border-radius: 20px;
      }
      
      .ssid-display {
        font-size: 1.3rem;
      }
    }

    /* Animations */
    @keyframes slideInLeft { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--glass-border);
      color: white; padding: 12px 24px; border-radius: 50px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 2000; font-size: 0.9rem; display: flex; align-items: center; gap: 10px;
      width: max-content;
      max-width: 90%;
    }
    .toast.active { transform: translateX(-50%) translateY(0); opacity: 1; }
    .loader { border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid white; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.8s linear infinite; display: none; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="brand">
      <i class="fas fa-wifi"></i> Connect
    </div>
    <a href="https://github.com/Dhaval915" target="_blank" class="github-link">
      <i class="fab fa-github"></i>
    </a>
  </nav>

  <div class="container">
    
    <div class="controls-panel">
      <h2><i class="fas fa-sliders-h"></i> Configuration</h2>
      
      <div class="form-group">
        <label>Network Name (SSID)</label>
        <input type="text" id="ssid" placeholder="Ex: My_Home_WiFi" oninput="updateLivePreview()">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="text" id="password" placeholder="Ex: secret123" oninput="updateLivePreview(); checkStrength()">
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        
        <label class="checkbox-wrapper">
          <input type="checkbox" id="hide-pass-toggle" onchange="updateLivePreview()">
          <span>Hide Password on Card (Privacy)</span>
        </label>
      </div>

      <div class="form-group">
        <label>Security Type</label>
        <select id="encryption">
          <option value="WPA">WPA/WPA2 (Most Common)</option>
          <option value="WEP">WEP</option>
          <option value="nopass">Open (No Password)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Card Icon</label>
        <select id="icon-select" onchange="updateLivePreview()">
          <option value="fas fa-wifi">📶 WiFi Signal</option>
          <option value="fas fa-home">🏠 Home</option>
          <option value="fas fa-building">🏢 Office</option>
          <option value="fas fa-coffee">☕ Cafe</option>
          <option value="fas fa-gamepad">🎮 Gaming</option>
          <option value="fas fa-rocket">🚀 Fast</option>
        </select>
      </div>

      <div class="form-group">
         <label>Theme Color</label>
         <div style="display: flex; gap: 10px;">
           <input type="color" id="color-picker" value="#3b82f6" oninput="updateTheme(this.value)" style="height: 45px; width: 80px; cursor: pointer; padding: 2px; border-radius: 8px;">
           <div style="flex-grow:1; display: flex; align-items: center; font-size: 0.8rem; color: var(--text-muted); line-height: 1.4;">
             Tap color to customize look.
           </div>
         </div>
      </div>

      <button class="btn btn-primary" onclick="generateQR()">
        <span id="gen-text">Update QR Code</span>
        <div class="loader" id="gen-loader"></div>
      </button>

      <div class="btn-group">
        <button class="btn btn-outline" onclick="downloadCard()">
          <i class="fas fa-download"></i> Download
        </button>
        <button class="btn btn-outline" onclick="shareCard()">
          <i class="fas fa-share-alt"></i> Share
        </button>
      </div>
    </div>

    <div class="preview-panel">
      <div id="wifi-card">
        <div class="card-header-bg" id="card-header"></div>
        
        <div class="card-content">
          <div class="network-icon-display">
            <i class="fas fa-wifi" id="card-icon"></i>
          </div>
          
          <div class="ssid-display" id="card-ssid">Your Network</div>
          <div class="pass-display" id="card-pass">••••••••</div>

          <div class="qr-frame">
            <canvas id="qrcode"></canvas>
          </div>
          
          <div class="scan-me-text">Scan to Connect</div>
        </div>
      </div>
      
      <div style="margin-top: 1.5rem; color: var(--text-muted); font-size: 0.85rem; text-align: center;">
        <i class="fas fa-info-circle"></i> Preview is live.
      </div>
    </div>

  </div>

  <div class="toast" id="toast">
    <i class="fas fa-check-circle" style="color: var(--success)"></i>
    <span id="toast-msg">Operation successful</span>
  </div>

  <script>
    /* --- State Management --- */
    const els = {
      ssid: document.getElementById('ssid'),
      password: document.getElementById('password'),
      encryption: document.getElementById('encryption'),
      icon: document.getElementById('icon-select'),
      hidePass: document.getElementById('hide-pass-toggle'),
      cardSSID: document.getElementById('card-ssid'),
      cardPass: document.getElementById('card-pass'),
      cardIcon: document.getElementById('card-icon'),
      cardHeader: document.getElementById('card-header'),
      qrCanvas: document.getElementById('qrcode'),
      toast: document.getElementById('toast'),
      strengthFill: document.getElementById('strength-fill')
    };

    /* --- Initialization --- */
    window.onload = () => {
      generateQR(true); 
    };

    /* --- Live Preview Logic --- */
    function updateLivePreview() {
      // SSID
      els.cardSSID.textContent = els.ssid.value.trim() || "Your Network";
      
      // Password logic
      const pass = els.password.value;
      
      if (els.hidePass.checked && pass.length > 0) {
        els.cardPass.textContent = "••••••••";
      } else {
        els.cardPass.textContent = pass ? pass : "No Password";
      }
      
      // Icon
      els.cardIcon.className = els.icon.value;
    }

    function updateTheme(color) {
      document.documentElement.style.setProperty('--primary', color);
      document.documentElement.style.setProperty('--primary-hover', adjustColor(color, -20));
      els.cardHeader.style.background = `linear-gradient(135deg, ${color}, ${adjustColor(color, 40)})`;
      document.querySelector('.brand').style.background = `linear-gradient(135deg, ${color}, ${adjustColor(color, 40)})`;
      document.querySelector('.brand').style.webkitBackgroundClip = 'text';
    }

    /* --- QR Generation --- */
    function generateQR(isInit = false) {
      const ssid = els.ssid.value.trim();
      const password = els.password.value;
      const encryption = els.encryption.value;
      
      if (!isInit && !ssid) {
        showToast("Please enter a Network Name", true);
        els.ssid.focus();
        return;
      }

      if(!isInit) {
        document.getElementById('gen-text').style.display = 'none';
        document.getElementById('gen-loader').style.display = 'block';
      }

      // Always use real password for QR data
      const qrText = `WIFI:T:${encryption};S:${ssid || "EXAMPLE"};P:${password};;`;
      
      setTimeout(() => {
        QRCode.toCanvas(els.qrCanvas, qrText, {
          width: 170,
          margin: 1,
          color: { dark: "#1e293b", light: "#ffffff" }
        }, (error) => {
          if(!isInit) {
            document.getElementById('gen-text').style.display = 'inline';
            document.getElementById('gen-loader').style.display = 'none';
          }
          if (error) console.error(error);
          else if (!isInit) showToast("QR Code Updated");
        });
      }, isInit ? 0 : 300);
    }

    /* --- Password Strength --- */
    function checkStrength() {
      const pass = els.password.value;
      let strength = 0;
      if (pass.length > 5) strength += 20;
      if (pass.length > 8) strength += 20;
      if (/[A-Z]/.test(pass)) strength += 20;
      if (/[0-9]/.test(pass)) strength += 20;
      if (/[^A-Za-z0-9]/.test(pass)) strength += 20;

      els.strengthFill.style.width = strength + "%";
      if(strength < 40) els.strengthFill.style.backgroundColor = "var(--danger)";
      else if(strength < 80) els.strengthFill.style.backgroundColor = "#fbbf24";
      else els.strengthFill.style.backgroundColor = "var(--success)";
    }

    /* --- Image Capture --- */
    async function captureCard() {
      const card = document.getElementById('wifi-card');
      
      return await html2canvas(card, {
        scale: 3, 
        backgroundColor: null,
        logging: false,
        useCORS: true,
        allowTaint: true,
        onclone: (clonedDoc) => {
          const clonedCard = clonedDoc.getElementById('wifi-card');
          clonedCard.style.transform = 'none';
          clonedCard.style.boxShadow = 'none';
          // Ensure correct sizing during capture
          clonedCard.style.maxWidth = '400px'; 
        }
      });
    }

    /* --- Download --- */
    async function downloadCard() {
      const ssid = els.ssid.value.trim() || "WiFi";
      showToast("Generating image...", false);

      try {
        const canvas = await captureCard();
        const link = document.createElement('a');
        link.download = `${ssid}_Connect.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast("Download started!");
      } catch (err) {
        console.error(err);
        showToast("Error generating image", true);
      }
    }

    /* --- Share --- */
    async function shareCard() {
      showToast("Preparing to share...", false);
      try {
        const canvas = await captureCard();
        
        canvas.toBlob(async (blob) => {
          if (navigator.share && navigator.canShare) {
            const file = new File([blob], "wifi-card.png", { type: "image/png" });
            const shareData = {
              files: [file],
              title: 'Connect to WiFi',
              text: `Connect to ${els.ssid.value || 'WiFi'} using this QR code.`
            };

            if (navigator.canShare(shareData)) {
              await navigator.share(shareData);
              showToast("Shared successfully!");
            } else {
              throw new Error("Sharing not supported");
            }
          } else {
            const item = new ClipboardItem({ "image/png": blob });
            await navigator.clipboard.write([item]);
            showToast("Image copied to clipboard!");
          }
        });
      } catch (err) {
        console.error(err);
        showToast("Sharing failed / Copied instead", true);
      }
    }

    /* --- Helpers --- */
    function showToast(msg, isError = false) {
      const toast = els.toast;
      const icon = toast.querySelector('i');
      document.getElementById('toast-msg').textContent = msg;
      icon.className = isError ? "fas fa-exclamation-circle" : "fas fa-check-circle";
      icon.style.color = isError ? "var(--danger)" : "var(--success)";
      toast.classList.add('active');
      setTimeout(() => toast.classList.remove('active'), 3000);
    }

    function adjustColor(color, amount) {
        return '#' + color.replace(/^#/, '').replace(/../g, color => ('0'+Math.min(255, Math.max(0, parseInt(color, 16) + amount)).toString(16)).substr(-2));
    }
  </script>
</body>
</html>
